<div class="container-fluid">
  <!-- Top Bar -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Dashboard</h4>
    <div>
      <button class="btn btn-outline-danger btn-sm ms-2 me-3" (click)="resetLayout()">
        Reset Layout
      </button>
      <button class="btn btn-primary" (click)="openModal()">+ Add Widget</button>
    </div>
  </div>

  <!-- Widget Grid -->
  <div class="row g-3" cdkDropList (cdkDropListDropped)="drop($event)">
    <div
      class="col-md-6 col-lg-4"
      *ngFor="let widget of widgets; trackBy: trackById"
      [ngClass]="widget.colClass"
      cdkDrag
    >
      <app-widget-card
        [title]="widget.title"
        (remove)="removeWidget(widget.id)"
        (resize)="updateSize(widget.id, $event)"
      >
        <p class="text-muted">{{ widget.title }} content</p>
      </app-widget-card>
    </div>
  </div>

  <!-- Modal -->
  <div
    class="modal fade show"
    tabindex="-1"
    [ngStyle]="{ display: showModal ? 'block' : 'none' }"
    *ngIf="showModal"
  >
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add Widget</h5>
          <button class="btn-close" (click)="closeModal()"></button>
        </div>

        <div class="modal-body">
          <div class="list-group" *ngIf="availableWidgets.length > 0; else noWidgets">
            <button
              class="list-group-item list-group-item-action"
              *ngFor="let widget of availableWidgets"
              (click)="addWidget(widget)"
            >
              {{ widget.title }}
            </button>
          </div>

          <ng-template #noWidgets>
            <p class="text-muted">All widgets already added</p>
          </ng-template>
        </div>
      </div>
    </div>
  </div>

  <!-- Backdrop -->
  <div class="modal-backdrop fade show" *ngIf="showModal"></div>
</div>
