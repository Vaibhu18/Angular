<div class="card shadow-sm h-100">
  <div class="card-header d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center gap-2">
      <span cdkDragHandle style="cursor: grab">☰</span>
      <span>{{ title }}</span>
    </div>

    <div class="d-flex gap-1">
      <button class="btn btn-sm btn-outline-secondary" (click)="onResize('sm')">S</button>
      <button class="btn btn-sm btn-outline-secondary" (click)="onResize('md')">M</button>
      <button class="btn btn-sm btn-outline-secondary" (click)="onResize('lg')">L</button>

      <button class="btn btn-sm btn-outline-danger" (click)="remove.emit()">✕</button>
    </div>
  </div>

  <div class="card-body">
    <ng-content></ng-content>
  </div>
</div>
