<div class="w-full h-full flex flex-col items-center">
  <div class="p-5 mt-5 w-md shadow-xl">
    <h1 class="text-center text-2xl font-bold">Registration Form</h1>

    <form [formGroup]="userData" (ngSubmit)="onSubmit()" class="flex flex-col gap-4 px-5 mt-5">
      <div class="flex flex-col gap-0.5">
        <label for="name" class="text-sm font-sans font-medium text-neutral-500">First Name</label>
        <input
          type="text"
          name="name"
          formControlName="firstName"
          class="shadow rounded-md pl-2 py-2 outline-none text-sm border border-neutral-200"
          [ngClass]="{ 'border-red-500': getError('firstName') }"
          placeholder="jhon"
        />
        <span class="pl-2 text-sm tracking-wide text-red-500 font-medium">{{
          getError('firstName')
        }}</span>
      </div>
      <div class="flex flex-col gap-0.5">
        <label for="name" class="text-sm font-sans font-medium text-neutral-500">Last Name</label>
        <input
          type="text"
          name="name"
          formControlName="lastName"
          class="shadow rounded-md pl-2 py-2 outline-none text-sm border border-neutral-200"
          [ngClass]="{ 'border-red-500': getError('lastName') }"
          placeholder="doe"
        />
        <span class="pl-2 text-sm tracking-wide text-red-500 font-medium">{{
          getError('lastName')
        }}</span>
      </div>
      <div class="flex flex-col gap-0.5">
        <label for="name" class="text-sm font-sans font-medium text-neutral-500">Email</label>
        <input
          type="text"
          name="name"
          formControlName="email"
          class="shadow rounded-md pl-2 py-2 outline-none text-sm border border-neutral-200"
          [ngClass]="{ 'border-red-500': getError('email') }"
          placeholder="jhon@gmail.com"
        />
        <span class="pl-2 text-sm tracking-wide text-red-500 font-medium">{{
          getError('email')
        }}</span>
      </div>
      <div class="flex flex-col gap-0.5">
        <label for="name" class="text-sm font-sans font-medium text-neutral-500">Mobile</label>
        <input
          type="text"
          name="name"
          formControlName="mobile"
          class="shadow rounded-md pl-2 py-2 outline-none text-sm border border-neutral-200"
          [ngClass]="{ 'border-red-500': getError('mobile') }"
          placeholder="9876543210"
        />
        <span class="pl-2 text-sm tracking-wide text-red-500 font-medium">{{
          getError('mobile')
        }}</span>
      </div>

      <span *ngIf="successMessage" class="text-sm text-green-500 font-medium tracking-wide">
        {{ successMessage }}
      </span>

      <div class="text-center">
        <button
          type="submit"
          [disabled]="loading"
          class="shadow-md px-5 py-2 rounded-md bg-black text-white transition-colors"
          [ngClass]="{
            'opacity-50 cursor-not-allowed': loading,
            'hover:bg-black/80 cursor-pointer': !loading,
          }"
        >
          {{ loading ? 'Submitting...' : 'Submit Details' }}
        </button>
      </div>
    </form>
  </div>
</div>
